<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پایگاه جامع مشاهیر BioGraph</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body>

    <header class="bg-indigo-700 text-white p-8 text-center shadow-lg">
        <h1 class="text-3xl font-bold mb-4">پایگاه جامع زندگینامه BioGraph</h1>
        <input type="text" id="searchInput" placeholder="نام شخص یا حوزه فعالیت را جستجو کنید..." 
               class="w-full max-w-md p-3 rounded-xl text-gray-800 outline-none focus:ring-4 ring-indigo-300">
    </header>

    <main class="max-w-5xl mx-auto p-6">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        const people = [
            { name: "حافظ شیرازی", category: "ادبیات", desc: "غزل‌سرای پرآوازه و خالق دیوان حافظ." },
            { name: "فردوسی", category: "ادبیات", desc: "حماسه‌سرای بزرگ و سراینده شاهنامه." },
            { name: "ابن سینا", category: "علمی", desc: "دانشمند، پزشک و فیلسوف برجسته." },
            { name: "مریم میرزاخانی", category: "علمی", desc: "ریاضیدان نابغه و برنده مدال فیلدز." }
        ];

        function render(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(p => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 hover:shadow-xl transition">
                    <span class="text-xs font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded">${p.category}</span>
                    <h3 class="text-xl font-bold mt-3 mb-2">${p.name}</h3>
                    <p class="text-gray-600 text-sm leading-relaxed">${p.desc}</p>
                </div>
            `).join('');
        }

        // قابلیت جستجوی زنده
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = people.filter(p => p.name.includes(term) || p.category.includes(term));
            render(filtered);
        });

        render(people); // نمایش اولیه
    </script>
</body>
</html>
